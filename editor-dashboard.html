<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Glitch HQ // Editor Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --pink: #ff3366; --bg: #05070a; --card: #0d0f14; --border: #2a2a36; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; }
    
    /* AUTH OVERLAY */
    #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .auth-box { width: 320px; padding: 40px; border: 1px solid var(--pink); background: var(--card); text-align: center; }
    .auth-input { width: 100%; background: #000; border: none; border-bottom: 2px solid var(--border); color: var(--pink); padding: 12px; text-align: center; font-size: 1.2rem; margin-bottom: 20px; outline: none; letter-spacing: 4px; }
    
    /* DASHBOARD */
    #mainDashboard { display: none; padding: 40px; }
    .wrapper { max-width: 1000px; margin: 0 auto; border: 1px solid var(--border); padding: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); padding: 20px; cursor: pointer; transition: 0.3s; }
    .card.selected { border-color: var(--pink); background: rgba(255, 51, 102, 0.05); }
    .input-final { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; margin-top: 10px; }
    .btn-push { width: 100%; padding: 20px; background: var(--pink); color: #000; border: none; font-weight: 900; text-transform: uppercase; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-box">
    <h2 style="font-size:0.8rem; margin-bottom:20px; letter-spacing:2px;">HQ_COMMAND_ACCESS</h2>
    <input type="password" id="editorPin" class="auth-input" placeholder="PIN" maxlength="6">
    <button style="width:100%; padding:15px; background:var(--pink); border:none; font-weight:900;" onclick="verifyEditor()">Enter Command</button>
  </div>
</div>

<div id="mainDashboard">
  <div class="wrapper">
    <h1 style="font-size:1.2rem; border-bottom:2px solid var(--pink); padding-bottom:10px;">JAKARTA_CURATION_ENGINE</h1>
    
    <div id="rawRef" style="font-size:0.7rem; color:#555; background:#000; padding:10px; margin-top:20px;">Menunggu Transmisi...</div>

    <div class="grid">
      <div class="card" id="cardA" onclick="selectStyle('A')">
        <h3 id="headA">-</h3>
        <p id="textA" style="font-size:0.8rem; color:#888; margin-top:10px;">Opsi A (Detective)</p>
      </div>
      <div class="card" id="cardB" onclick="selectStyle('B')">
        <h3 id="headB">-</h3>
        <p id="textB" style="font-size:0.8rem; color:#888; margin-top:10px;">Opsi B (Poet)</p>
      </div>
    </div>

    <div style="margin-top:30px;">
      <label style="font-size:0.6rem; color:var(--pink); font-weight:800;">HEADLINE FINAL</label>
      <input type="text" id="finalHeadline" class="input-final">

      <label style="font-size:0.6rem; color:var(--pink); font-weight:800; display:block; margin-top:20px;">SUNTIKAN HOOK</label>
      <textarea id="finalHook" class="input-final" rows="3" placeholder="Tuliskan pemicu berpikir..."></textarea>
      
      <button class="btn-push" onclick="deploy()">Push Deploy <i class="fas fa-bolt"></i></button>
    </div>
  </div>
</div>

<script>
  let selected = 'A';
  let reportData = null;

  function verifyEditor() {
    if(document.getElementById('editorPin').value === "654321") { // Ganti PIN Editor
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('mainDashboard').style.display = 'block';
      loadData();
    } else { alert("ACCESS DENIED"); }
  }

  function loadData() {
    reportData = JSON.parse(localStorage.getItem('latestReport'));
    if(reportData) {
      document.getElementById('rawRef').innerText = `RAW_DATA: ${reportData.originalContent.substring(0,100)}...`;
      document.getElementById('headA').innerText = reportData.headlineA;
      document.getElementById('textA').innerText = reportData.contentA;
      document.getElementById('headB').innerText = reportData.headlineB;
      document.getElementById('textB').innerText = reportData.contentB;
      selectStyle('A');
    }
  }

  function selectStyle(type) {
    selected = type;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    document.getElementById('card' + type).classList.add('selected');
    document.getElementById('finalHeadline').value = reportData['headline' + type];
  }

  function deploy() {
    if(!document.getElementById('finalHook').value) return alert("Suntikkan Hook!");
    alert("DEPLOY BERHASIL ke Jaringan Glitch.");
    localStorage.removeItem('latestReport');
    window.location.reload();
  }
</script>
</body>
</html>
