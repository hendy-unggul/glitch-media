<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch // Reporter Node</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff2d55;
      --pink-dim: rgba(255,45,85,0.12);
      --bg: #070809;
      --card: #0e1014;
      --surface: #13161c;
      --border: rgba(255,255,255,0.07);
      --border-hot: rgba(255,45,85,0.4);
      --text: #e8e8e8;
      --muted: #5a5e6a;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── AUTH SCREEN ── */
    #authScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      transition: opacity 0.5s, transform 0.5s;
    }

    #authScreen.exit {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }

    .auth-tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--pink);
      letter-spacing: 4px;
      margin-bottom: 32px;
      opacity: 0.7;
    }

    .auth-box {
      width: 340px;
      border: 1px solid var(--border-hot);
      background: var(--card);
      padding: 40px;
      position: relative;
    }

    .auth-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
    }

    .auth-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
      text-align: center;
    }

    .pin-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border: 1px solid var(--border-hot);
      border-radius: 50%;
      transition: background 0.15s;
    }

    .pin-dot.filled {
      background: var(--pink);
      border-color: var(--pink);
      box-shadow: 0 0 8px rgba(255,45,85,0.5);
    }

    .pin-input {
      width: 100%;
      background: transparent;
      border: none;
      color: transparent;
      caret-color: transparent;
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 20px;
      outline: none;
      margin-bottom: 20px;
      height: 1px;
      position: absolute;
    }

    .auth-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .key {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 16px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .key:hover { background: rgba(255,45,85,0.08); border-color: var(--border-hot); }
    .key:active { background: var(--pink-dim); }
    .key.wide { grid-column: span 3; color: var(--pink); font-size: 0.7rem; letter-spacing: 2px; }
    .key.del { color: var(--muted); }

    .auth-error {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--pink);
      text-align: center;
      margin-top: 16px;
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .auth-error.show { opacity: 1; }

    /* ── MAIN CONTENT ── */
    #mainContent {
      display: none;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(7,8,9,0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--pink);
    }

    .node-id {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(46,204,113,0.5); }
      50% { opacity: 0.5; box-shadow: none; }
    }

    /* Form area */
    .form-wrap {
      max-width: 680px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--pink);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 2px;
      color: var(--muted);
      display: block;
      margin: 24px 0 8px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--border-hot);
      background: var(--surface);
    }

    textarea {
      resize: vertical;
      min-height: 220px;
      line-height: 1.7;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--pink);
      font-size: 0.8rem;
      pointer-events: none;
    }

    select option { background: #0e1014; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Word counter */
    .counter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .word-count {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      transition: color 0.3s;
    }

    .word-count.ok { color: #2ecc71; }

    .progress-bar {
      width: 120px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--pink);
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .progress-fill.ok { background: #2ecc71; }

    /* Submit button */
    .btn-transmit {
      width: 100%;
      margin-top: 40px;
      padding: 20px;
      background: transparent;
      border: 1px solid var(--border-hot);
      color: var(--pink);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .btn-transmit::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%;
      height: 100%;
      background: var(--pink);
      transition: left 0.3s;
      z-index: -1;
    }

    .btn-transmit:hover::before { left: 0; }
    .btn-transmit:hover { color: #000; }

    .btn-transmit:disabled {
      border-color: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-transmit:disabled::before { display: none; }

    /* Transmitting state */
    .transmit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,8,9,0.95);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    .transmit-overlay.show { display: flex; }

    .glitch-text {
      font-family: var(--mono);
      font-size: 1.2rem;
      color: var(--pink);
      letter-spacing: 4px;
      animation: glitch 0.5s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 #ff2d55, -2px 0 #00f0ff; clip-path: none; }
      20% { text-shadow: -2px 0 #ff2d55, 2px 0 #00f0ff; }
      40% { clip-path: inset(40% 0 20% 0); }
      60% { text-shadow: 0 0 #ff2d55; clip-path: none; }
      100% { text-shadow: 2px 0 #ff2d55, -2px 0 #00f0ff; }
    }

    .transmit-steps {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-align: center;
      line-height: 2;
    }

    .transmit-step.active { color: var(--text); }
    .transmit-step.done { color: #2ecc71; }
    .transmit-step.done::before { content: '✓ '; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <p class="auth-tag">// GLITCH_NETWORK // REP_NODE_v2.0 //</p>
  <div class="auth-box">
    <p class="auth-title">Reporter Access</p>

    <div class="pin-row" id="pinRow">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>

    <div class="auth-keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key del" onclick="pressKey('del')">DEL</button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key" onclick="verifyPin()">→</button>
    </div>
    <p class="auth-error" id="authError">ACCESS DENIED</p>
  </div>
</div>

<!-- TRANSMIT OVERLAY -->
<div class="transmit-overlay" id="transmitOverlay">
  <p class="glitch-text">TRANSMITTING</p>
  <div class="transmit-steps">
    <div class="transmit-step" id="step1">[ ] Enkripsi payload...</div>
    <div class="transmit-step" id="step2">[ ] Kirim ke AI Engine...</div>
    <div class="transmit-step" id="step3">[ ] Simpan ke antrian HQ...</div>
    <div class="transmit-step" id="step4">[ ] Konfirmasi transmisi...</div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <header class="header">
    <div class="logo">GLITCH //</div>
    <div class="node-id" id="nodeId">REP_NODE — —</div>
    <div class="status-pill">
      <span class="status-dot"></span>
      LIVE_UPLINK
    </div>
  </header>

  <div class="form-wrap">
    <div class="section-label">LAPANGAN TRANSMISI</div>

    <label class="field-label">JUDUL INTERNAL</label>
    <input type="text" id="rawTitle" placeholder="Fokus utama kejadian...">

    <div class="grid-2">
      <div>
        <label class="field-label">KOTA</label>
        <div class="select-wrap">
          <select id="cityCode">
            <option value="BDG">BANDUNG</option>
            <option value="JKT">JAKARTA</option>
            <option value="SBY">SURABAYA</option>
            <option value="YGY">YOGYAKARTA</option>
          </select>
        </div>
      </div>
      <div>
        <label class="field-label">RUBRIK</label>
        <div class="select-wrap">
          <select id="rubrikId">
            <option value="LIAR">HARD NEWS</option>
            <option value="BISING">INVESTIGASI</option>
            <option value="GERAK">OPINI</option>
            <option value="DIAM">LIFE STYLE</option>
          </select>
        </div>
      </div>
    </div>

    <label class="field-label">NARASI MENTAH — 5W+1H (MIN. 150 KATA)</label>
    <textarea id="rawContent" placeholder="Tulis kejujuran kamu di sini. Siapa, apa, kapan, di mana, kenapa, bagaimana..."></textarea>

    <div class="counter-row">
      <span class="word-count" id="wordCount">0 / 150 KATA</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <button class="btn-transmit" id="submitBtn" disabled onclick="transmit()">
      KIRIM KE JAKARTA HQ
    </button>
  </div>
</div>

<script>
  // ── PIN LOGIC ──
  const REPORTER_PIN = '123456'; // Idealnya divalidasi server-side via /api/auth
  let pinBuffer = '';

  function pressKey(k) {
    if (k === 'del') {
      pinBuffer = pinBuffer.slice(0, -1);
    } else {
      if (pinBuffer.length >= 6) return;
      pinBuffer += k;
    }
    updateDots();
    if (pinBuffer.length === 6) setTimeout(verifyPin, 150);
  }

  function updateDots() {
    for (let i = 0; i < 6; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
    }
  }

  function verifyPin() {
    if (pinBuffer === REPORTER_PIN) {
      const screen = document.getElementById('authScreen');
      screen.classList.add('exit');
      setTimeout(() => {
        screen.style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('nodeId').textContent = `REP_NODE — ${document.getElementById('cityCode').value}`;
      }, 500);
    } else {
      const err = document.getElementById('authError');
      err.classList.add('show');
      pinBuffer = '';
      updateDots();
      setTimeout(() => err.classList.remove('show'), 2000);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (document.getElementById('authScreen').style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    if (e.key === 'Backspace') pressKey('del');
    if (e.key === 'Enter') verifyPin();
  });

  // ── WORD COUNTER ──
  const rawContent = document.getElementById('rawContent');
  const rawTitle = document.getElementById('rawTitle');
  const submitBtn = document.getElementById('submitBtn');
  const wordCountEl = document.getElementById('wordCount');
  const progressFill = document.getElementById('progressFill');

  function countWords(text) {
    return text.trim().split(/\s+/).filter(w => w.length > 0).length;
  }

  function checkForm() {
    const words = countWords(rawContent.value);
    const pct = Math.min((words / 150) * 100, 100);
    const titleOk = rawTitle.value.trim().length > 5;
    const wordsOk = words >= 150;

    wordCountEl.textContent = `${words} / 150 KATA`;
    wordCountEl.classList.toggle('ok', wordsOk);
    progressFill.style.width = pct + '%';
    progressFill.classList.toggle('ok', wordsOk);
    submitBtn.disabled = !(titleOk && wordsOk);
  }

  rawContent.addEventListener('input', checkForm);
  rawTitle.addEventListener('input', checkForm);

  // ── TRANSMIT LOGIC ──
  async function transmit() {
    const overlay = document.getElementById('transmitOverlay');
    overlay.classList.add('show');

    const steps = ['step1', 'step2', 'step3', 'step4'];

    // Animate steps
    async function activateStep(i, delay) {
      await new Promise(r => setTimeout(r, delay));
      document.getElementById(steps[i]).classList.add('active');
    }

    async function doneStep(i) {
      document.getElementById(steps[i]).classList.remove('active');
      document.getElementById(steps[i]).classList.add('done');
    }

    await activateStep(0, 300);
    await activateStep(1, 900);

    try {
      const response = await fetch('/api/transmit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: rawTitle.value.trim(),
          content: rawContent.value.trim(),
          city: document.getElementById('cityCode').value,
          rubric: document.getElementById('rubrikId').value
        })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.message || 'API Error');
      }

      const result = await response.json();
      doneStep(0); doneStep(1);
      await activateStep(2, 200);
      doneStep(2);
      await activateStep(3, 400);
      doneStep(3);

      await new Promise(r => setTimeout(r, 600));

      // Transmisi berhasil — tampilkan konfirmasi inline, reset form
      sessionStorage.setItem('lastTransmissionId', result.id);
      sessionStorage.setItem('lastTransmissionCity', result.city_code);

      overlay.classList.remove('show');

      // Reset form
      document.getElementById('rawTitle').value = '';
      document.getElementById('rawContent').value = '';
      checkForm();

      // Tampilkan notif sukses
      const notif = document.createElement('div');
      notif.style.cssText = `
        position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
        background:#0e1014; border:1px solid #2ecc71; color:#2ecc71;
        font-family:var(--mono); font-size:0.65rem; letter-spacing:2px;
        padding:16px 32px; z-index:300; white-space:nowrap;
      `;
      notif.textContent = `✓ TRANSMISI MASUK ANTRIAN — ID: ${result.id.substring(0,8).toUpperCase()}`;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 5000);

    } catch (err) {
      overlay.classList.remove('show');
      alert(`TRANSMISI GAGAL: ${err.message}`);
    }
  }
</script>
</body>
</html>
