<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch // Reporter Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --pink: #ff3366; --bg: #0a0c10; --card: #13161c; --border: #2a2a36; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; }
    
    /* AUTH OVERLAY */
    #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .auth-box { width: 320px; padding: 40px; border: 1px solid var(--pink); background: var(--card); text-align: center; }
    .auth-input { width: 100%; background: #000; border: none; border-bottom: 2px solid var(--border); color: var(--pink); padding: 12px; text-align: center; font-size: 1.2rem; margin-bottom: 20px; outline: none; letter-spacing: 4px; }
    .btn-auth { width: 100%; padding: 15px; background: var(--pink); color: #000; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; }

    /* CONTENT */
    #mainContent { display: none; padding: 40px 20px; }
    .container { max-width: 700px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 30px; position: relative; }
    .container::after { content: "REP_NODE_v1.1"; position: absolute; top: -10px; right: 20px; background: var(--pink); color: #000; font-size: 0.6rem; font-weight: 900; padding: 2px 10px; }
    
    h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    label { display: block; font-size: 0.65rem; color: var(--pink); font-weight: 800; text-transform: uppercase; margin: 15px 0 5px; }
    input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; outline: none; }
    .btn-send { width: 100%; padding: 18px; background: transparent; border: 2px solid var(--pink); color: var(--pink); font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 30px; }
    .btn-send:disabled { border-color: #333; color: #444; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-box">
    <h2 style="font-size:0.8rem; margin-bottom:20px; letter-spacing:2px;">REPORTER_ACCESS</h2>
    <input type="password" id="repPin" class="auth-input" placeholder="PIN" maxlength="6">
    <button class="btn-auth" onclick="verifyRep()">Verify Identity</button>
  </div>
</div>

<div id="mainContent">
  <div class="container">
    <h1><i class="fas fa-satellite"></i> Lapangan Transmisi</h1>
    <form id="reportForm">
      <label>Judul (Internal Reference)</label>
      <input type="text" id="rawTitle" placeholder="Fokus Utama Kejadian">

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <label>Kota</label>
          <select id="cityCode"><option value="BDG">BANDUNG</option><option value="JKT">JAKARTA</option></select>
        </div>
        <div>
          <label>Rubrik</label>
          <select id="rubrikId"><option value="LIAR">LIAR</option><option value="BISING">BISING</option></select>
        </div>
      </div>

      <label>Narasi Mentah (Min. 150 Kata)</label>
      <textarea id="rawContent" rows="10" placeholder="Ketik 5W+1H secara jujur..."></textarea>
      <div id="wordCounter" style="text-align:right; font-size:0.6rem; color:#555; margin-top:5px;">0 / 150 KATA</div>

      <button type="button" id="submitBtn" class="btn-send" disabled>Kirim ke Jakarta <i class="fas fa-bolt"></i></button>
    </form>
  </div>
</div>

<script>
  function verifyRep() {
    if(document.getElementById('repPin').value === "123456") { // Ganti PIN sesuai kebutuhan
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    } else { alert("ACCESS DENIED"); }
  }

  const contentInput = document.getElementById('rawContent');
  const titleInput = document.getElementById('rawTitle');
  const submitBtn = document.getElementById('submitBtn');

  contentInput.addEventListener('input', () => {
    const words = contentInput.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    document.getElementById('wordCounter').innerText = `${words} / 150 KATA`;
    submitBtn.disabled = !(words >= 150 && titleInput.value.length > 5);
  });

  submitBtn.addEventListener('click', async () => {
    submitBtn.innerText = "TRANSMITTING TO HQ...";
    try {
      const response = await fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: titleInput.value,
          content: contentInput.value,
          city: document.getElementById('cityCode').value,
          rubric: document.getElementById('rubrikId').value
        })
      });
      const result = await response.json();
      localStorage.setItem('latestReport', JSON.stringify(result));
      window.location.href = 'editor-dashboard.html';
    } catch (e) { alert("ERROR CONNECTING TO API"); }
  });
</script>
</body>
</html>
